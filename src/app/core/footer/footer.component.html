<footer class="footer">
  <div class="footer__container">

    <!-- BIG STATEMENT -->
    <div class="footer__top">
      <h2 class="footer__headline" i18n="@@footer.headline">
        Let's build something
        <span>impactful</span>
      </h2>

      <p class="footer__subtext" i18n="@@footer.subtext">
        I design scalable frontend systems with performance and clarity in mind.
      </p>

      <div class="footer__actions">
        <app-button size="md" (click)="handleContactUs()" i18n="@@footer.getInTouch">Get In Touch</app-button>
      </div>
    </div>

    <!-- DIVIDER -->
    <div class="footer__divider"></div>

    <!-- BOTTOM -->
    <div class="footer__bottom">
      <p i18n="@@footer.copyright">© 2026 Shivank Mittal</p>
      <p class="footer__status">
        <span class="dot"></span> <span i18n="@@footer.availableStatus">Available for opportunities</span>
      </p>
    </div>

  </div>
</footer>
