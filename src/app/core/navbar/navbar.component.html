<nav role="navigation">

    <h3 class="logo" (click)="handleLogoClick()" >Shivank Mittal</h3>

    <ul class="item-section">
        @if((deviceType$ | async) !== "mobile") {
            @for (item of navbarInfo().items; track $index) {
                <li [id]="item.id" (keydown)="keyInteractionHandler($event)">
                    <a #navItem (click)="handleElementSection(item)">
                        {{item.name | titlecase}}
                    </a>
                </li>
            }
        }

        
        <li class="cta">
            <div class="identity">
                @let navbarData = avatarInfo$ | async;
                <app-avatar
                    [name]="navbarData?.name"
                    [src]="navbarData?.src || ''"
                    [alt]="navbarData?.alt || navbarData?.name"
                    [loggedIn]="navbarData?.loggedIn || false"
                    [size]="'md'" 
                    (click)="loginHandler(navbarData?.loggedIn ? 'logout' : 'login')"
                    />
            </div>
        </li>
    </ul>
</nav>
