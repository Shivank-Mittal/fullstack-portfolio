<div class="thumbnail-wrapper" [attr.data-state]="state()">

      <!-- Skeleton shimmer -->
      @if (state() === 'skeleton' || state() === 'loading') {
        <div class="skeleton">
          <div class="skeleton-page">
            <div class="sk-name"></div>
            <div class="sk-title"></div>
            <div class="sk-divider"></div>
            <div class="sk-section"></div>
            <div class="sk-line wide"></div>
            <div class="sk-line medium"></div>
            <div class="sk-line narrow"></div>
            <div class="sk-section"></div>
            <div class="sk-line wide"></div>
            <div class="sk-line medium"></div>
            <div class="sk-section"></div>
            <div class="sk-line wide"></div>
            <div class="sk-line narrow"></div>
          </div>
        </div>
      }


      <!-- PDF.js canvas path -->
      <canvas
        #pdfCanvas
        class="thumbnail-img"
        [class.visible]="state() === 'loaded'"
        [attr.aria-label]="alt()"
      ></canvas>


      <!-- Error state -->
      @if (state() === 'error') {
        <div class="error-state">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <line x1="12" y1="10" x2="12.01" y2="10"/>
          </svg>
          <span i18n="@@resumeThumbnail.previewUnavailable">Preview unavailable</span>
        </div>
      }

    </div>
